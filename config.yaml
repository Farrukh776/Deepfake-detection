# ============================================================
#  Deepfake Detection System — Central Configuration
# ============================================================

# ── Dataset ─────────────────────────────────────────────────
data:
  root_dir: "data"
  train_real: "data/train/real"
  train_fake: "data/train/fake"
  val_real:   "data/val/real"
  val_fake:   "data/val/fake"
  test_real:  "data/test/real"
  test_fake:  "data/test/fake"
  image_size: 128                
  max_samples_per_class: 20000   # cap training data (pretrained model doesn't need more)
  random_seed: 42

# ── Model ────────────────────────────────────────────────────
model:
  backbone: "efficientnet_b0"
  pretrained: true
  dropout: 0.4
  freeze_epochs: 2

# ── Training ─────────────────────────────────────────────────
training:
  epochs: 10                     # reduced from 15
  batch_size: 64
  num_workers: 2
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  scheduler: "cosine"
  early_stopping_patience: 3     # reduced from 4
  mixed_precision: true
  grad_clip: 1.0

# ── Augmentation ─────────────────────────────────────────────
augmentation:
  horizontal_flip: 0.5
  rotation_limit: 15
  brightness_contrast: 0.2
  blur_limit: 3
  jpeg_quality: [70, 100]
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std:  [0.229, 0.224, 0.225]

# ── Paths ────────────────────────────────────────────────────
paths:
  checkpoint_dir: "checkpoints"
  results_dir:    "results"
  plots_dir:      "results/plots"
  metrics_dir:    "results/metrics"
  gradcam_dir:    "results/gradcam"
  logs_dir:       "logs"
  best_model:     "checkpoints/best_model.pth"

# ── Evaluation ───────────────────────────────────────────────
evaluation:
  threshold: 0.5
  gradcam_samples: 16
  gradcam_target_layer: "blocks[-1]"
