augmentation:
  blur_limit: 3
  brightness_contrast: 0.2
  horizontal_flip: 0.5
  jpeg_quality:
  - 70
  - 100
  normalize_mean:
  - 0.485
  - 0.456
  - 0.406
  normalize_std:
  - 0.229
  - 0.224
  - 0.225
  rotation_limit: 15
data:
  image_size: 128
  max_samples_per_class: 15000
  max_val_samples_per_class: 2000
  random_seed: 42
  root_dir: data
  test_fake: data/test/fake
  test_real: data/test/real
  train_fake: data/train/fake
  train_real: data/train/real
  val_fake: data/val/fake
  val_real: data/val/real
evaluation:
  gradcam_samples: 16
  gradcam_target_layer: blocks[-1]
  threshold: 0.5
model:
  backbone: efficientnet_b0
  dropout: 0.4
  freeze_epochs: 2
  pretrained: true
paths:
  best_model: checkpoints/best_model.pth
  checkpoint_dir: checkpoints
  gradcam_dir: results/gradcam
  logs_dir: logs
  metrics_dir: results/metrics
  plots_dir: results/plots
  results_dir: results
training:
  batch_size: 128
  early_stopping_patience: 4
  epochs: 15
  grad_clip: 1.0
  learning_rate: 0.0001
  mixed_precision: true
  num_workers: 4
  scheduler: cosine
  weight_decay: 1.0e-05
